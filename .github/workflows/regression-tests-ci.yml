name: Trello API Test Automation CI

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
        continue-on-error: true

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

      - name: Check for vulnerabilities
        if: always()
        run: |
          if [ -f target/dependency-check-report.html ]; then
            echo "### 🔒 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
            echo "Download the dependency-check-report artifact to review findings." >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.TRELLO_API_KEY }}" ] || [ -z "${{ secrets.TRELLO_API_TOKEN }}" ]; then
            echo "❌ Error: TRELLO_API_KEY or TRELLO_API_TOKEN not set"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Allure CLI
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/io/qameta/allure
          key: ${{ runner.os }}-allure-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-allure-

      - name: Execute TestNG Tests
        run: mvn clean test -DsuiteXmlFile=src/test/resources/regression-test.xml
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}

      - name: Check Test Results
        if: always()
        run: |
          if [ -d "target/surefire-reports" ]; then
            FAILED=$(find target/surefire-reports -name "*.xml" -exec grep -l 'failures="[1-9]' {} \; | wc -l)
            ERRORS=$(find target/surefire-reports -name "*.xml" -exec grep -l 'errors="[1-9]' {} \; | wc -l)
            if [ $FAILED -gt 0 ] || [ $ERRORS -gt 0 ]; then
              echo "TEST_STATUS=failed" >> $GITHUB_ENV
              echo "⚠️ Tests completed with failures" >> $GITHUB_STEP_SUMMARY
              exit 1
            else
              echo "TEST_STATUS=passed" >> $GITHUB_ENV
              echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 1

  report:
    name: Generate & Publish Report
    runs-on: ubuntu-latest
    needs: test
    if: success() || failure()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Get Allure History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure History
        if: always()
        run: |
          if [ -d "gh-pages/allure-history" ]; then
            echo "📊 Restoring test history..."
            mkdir -p target/allure-results/history
            cp -r gh-pages/allure-history/* target/allure-results/history/
            echo "✅ History restored successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No previous history found, starting fresh" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate Allure Report
        run: mvn allure:report

      - name: Prepare Allure History for Next Run
        if: always()
        run: |
          mkdir -p target/site/allure-maven-plugin/allure-history
          if [ -d "target/site/allure-maven-plugin/history" ]; then
            cp -r target/site/allure-maven-plugin/history/* target/site/allure-maven-plugin/allure-history/
          fi

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 30

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin/

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print Deployed URL to Summary
        if: always()
        run: |
          echo "### 🚀 Allure Report Successfully Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "👉 **[Click here to view the report](${{ steps.deployment.outputs.page_url }})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Environment:**" >> $GITHUB_STEP_SUMMARY
          echo "- Java: ${{ steps.setup-java.outputs.java-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Runner: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY